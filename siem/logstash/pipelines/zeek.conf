# zeek.conf — Logstash pipeline for Zeek JSON logs
#
# P9 (S4): ECS 8.x field convention -- see suricata.conf header. All ECS
# fields use Logstash nested syntax ([source][ip], [event][kind], ...) so
# core fields are named identically across the suricata-*/zeek-*/syslog-*
# indices.
input {
  file {
    path => ["/zeek-logs/conn.log", "/zeek-logs/dns.log", "/zeek-logs/http.log",
             "/zeek-logs/notice.log", "/zeek-logs/ssh.log", "/zeek-logs/ssl.log"]
    start_position => "beginning"
    # P5: persist the read position (see suricata.conf) so a Logstash restart
    # doesn't replay the Zeek logs and double-count events in ES.
    sincedb_path => "/usr/share/logstash/data/sincedb_zeek"
    codec => json
    type => "zeek"
  }
}

filter {
  if [type] == "zeek" {
    # Convert Zeek timestamp (epoch float) to ISO8601
    if [ts] {
      ruby {
        code => "event.set('@timestamp', LogStash::Timestamp.at(event.get('ts').to_f))"
      }
      mutate { remove_field => ["ts"] }
    }

    # Map Zeek field names to ECS
    if [id.orig_h] {
      mutate {
        rename => { "[id.orig_h]" => "[source][ip]" }
        rename => { "[id.resp_h]" => "[destination][ip]" }
        rename => { "[id.orig_p]" => "[source][port]" }
        rename => { "[id.resp_p]" => "[destination][port]" }
      }
    }

    # GeoIP on source
    if [source][ip] {
      geoip {
        source => "[source][ip]"
        target => "[source][geo]"
      }
    }

    # Tag Zeek notice events as alerts
    if [_path] == "notice" {
      mutate {
        add_field => { "[event][kind]" => "alert" }
        add_field => { "[event][category]" => "network" }
      }
    }

    mutate {
      add_field => { "[observer][type]" => "nsm" }
      add_field => { "[observer][name]" => "zeek" }
    }
  }
}

output {
  if [type] == "zeek" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "zeek-%{+YYYY.MM.dd}"
    }
  }
}
