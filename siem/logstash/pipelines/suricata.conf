# suricata.conf — Logstash pipeline for Suricata EVE JSON logs
input {
  file {
    path => "/suricata-logs/eve.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "suricata"
  }
}

filter {
  if [type] == "suricata" {
    # Parse timestamp
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # GeoIP enrichment on source IP
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "source.geo"
        fields => ["city_name", "country_code2", "country_name", "latitude", "longitude", "location"]
      }
      mutate {
        rename => { "src_ip" => "[source][ip]" }
      }
    }

    # Map destination IP
    if [dest_ip] {
      mutate {
        rename => { "dest_ip" => "[destination][ip]" }
        rename => { "dest_port" => "[destination][port]" }
        rename => { "src_port" => "[source][port]" }
      }
    }

    # Tag with ATT&CK data if alert
    if [event_type] == "alert" {
      mutate {
        add_field => { "event.kind" => "alert" }
        add_field => { "event.category" => "intrusion_detection" }
        add_field => { "observer.type" => "ids" }
        add_field => { "observer.name" => "suricata" }
      }
    }

    # Normalize severity
    if [alert][severity] == 1 { mutate { add_field => { "event.severity_label" => "critical" } } }
    else if [alert][severity] == 2 { mutate { add_field => { "event.severity_label" => "high" } } }
    else if [alert][severity] == 3 { mutate { add_field => { "event.severity_label" => "medium" } } }
    else { mutate { add_field => { "event.severity_label" => "low" } } }
  }
}

output {
  if [type] == "suricata" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "suricata-%{+YYYY.MM.dd}"
    }
  }
}
