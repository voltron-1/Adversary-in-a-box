# suricata.conf — Logstash pipeline for Suricata EVE JSON logs
#
# P9 (S4): ECS 8.x field convention. All ECS fields use Logstash nested
# syntax -- [source][ip], [event][kind], [observer][name] -- NOT dotted
# string keys ("event.kind"). The two are not interchangeable: Logstash
# conditionals can only reference the nested form, and mixing them produced
# inconsistent field shapes across the suricata-*/zeek-*/syslog-* indices.
# Core fields are named identically across all three pipelines:
#   [source][ip] [source][port] [destination][ip] [destination][port]
#   [event][kind] [event][category] [observer][type] [observer][name]
input {
  file {
    path => "/suricata-logs/eve.json"
    start_position => "beginning"
    # P5: persist the read position on the logstash-data named volume so a
    # Logstash restart resumes instead of re-reading eve.json from byte 0,
    # which duplicated every alert into ES and corrupted MTTD/MTTA scoring.
    sincedb_path => "/usr/share/logstash/data/sincedb_suricata"
    codec => json
    type => "suricata"
  }
}

filter {
  if [type] == "suricata" {
    # Parse timestamp
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # GeoIP enrichment on source IP
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "[source][geo]"
        fields => ["city_name", "country_code2", "country_name", "latitude", "longitude", "location"]
      }
      mutate {
        rename => { "src_ip" => "[source][ip]" }
        rename => { "src_port" => "[source][port]" }
      }
    }

    # Map destination IP
    if [dest_ip] {
      mutate {
        rename => { "dest_ip" => "[destination][ip]" }
        rename => { "dest_port" => "[destination][port]" }
      }
    }

    # Tag with ATT&CK data if alert
    if [event_type] == "alert" {
      mutate {
        add_field => { "[event][kind]" => "alert" }
        add_field => { "[event][category]" => "intrusion_detection" }
        add_field => { "[observer][type]" => "ids" }
        add_field => { "[observer][name]" => "suricata" }
      }
    }

    # Normalize severity. [event][severity_label] is a deliberate lab-local
    # convenience field (ECS reserves event.severity for the numeric code).
    if [alert][severity] {
      if [alert][severity] == 1 { mutate { add_field => { "[event][severity_label]" => "critical" } } }
      else if [alert][severity] == 2 { mutate { add_field => { "[event][severity_label]" => "high" } } }
      else if [alert][severity] == 3 { mutate { add_field => { "[event][severity_label]" => "medium" } } }
      else { mutate { add_field => { "[event][severity_label]" => "low" } } }
    }
  }
}

output {
  if [type] == "suricata" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "suricata-%{+YYYY.MM.dd}"
    }
  }
}
