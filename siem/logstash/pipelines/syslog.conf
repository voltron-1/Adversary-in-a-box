# syslog.conf — Logstash pipeline for syslog (auth, cron, sudo events)
#
# P9 (S4): ECS 8.x field convention -- see suricata.conf header. All ECS
# fields use Logstash nested syntax so core fields are named identically
# across the suricata-*/zeek-*/syslog-* indices.
#
# Note on [source][ip]: host-local process events (sudo, cron) have no
# network source by design, so they legitimately omit it. SSH auth failures
# DO carry a remote source, extracted below into [source][ip] -- so the field
# is named identically wherever it is present across all three indices.
input {
  syslog {
    port => 5514
    type => "syslog"
  }
}

filter {
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:[host][name]} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:syslog_message}" }
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
    }

    mutate {
      add_field => { "[observer][type]" => "host" }
      add_field => { "[observer][name]" => "syslog" }
    }

    # Detect sudo events — T1548.003
    if [program] == "sudo" {
      mutate {
        add_tag => ["sudo_event", "T1548.003"]
        add_field => { "[event][category]" => "process" }
        add_field => { "[threat][technique][id]" => "T1548.003" }
        add_field => { "[threat][technique][name]" => "Sudo and Sudo Caching" }
      }
    }

    # Detect cron events — T1053.003
    if [program] =~ /cron/ {
      mutate {
        add_tag => ["cron_event", "T1053.003"]
        add_field => { "[event][category]" => "process" }
        add_field => { "[threat][technique][id]" => "T1053.003" }
      }
    }

    # Detect SSH auth failures — T1110
    if [program] == "sshd" and [syslog_message] =~ /Failed/ {
      # Pull the remote source IP out of the sshd message into ECS [source][ip].
      grok {
        match => { "syslog_message" => "from %{IP:[source][ip]}" }
        tag_on_failure => []
      }
      mutate {
        add_tag => ["ssh_auth_failure", "T1110"]
        add_field => { "[event][kind]" => "alert" }
        # ECS: an SSH auth failure is an authentication event. Without this the
        # sudo/cron blocks set [event][category] but this one did not, so SSH
        # brute-force alerts landed in ES with a null category and dropped out
        # of any category-filtered detection query or dashboard panel.
        add_field => { "[event][category]" => "authentication" }
        add_field => { "[threat][technique][id]" => "T1110" }
      }
    }
  }
}

output {
  if [type] == "syslog" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "syslog-%{+YYYY.MM.dd}"
    }
  }
}
