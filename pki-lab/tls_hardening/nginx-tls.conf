# nginx-tls.conf — TLS 1.3 hardened nginx configuration
# Domain 3 Exercise 3.2 — TLS Hardening (SY0-701)

server {
    listen 443 ssl http2;
    server_name victim-web.lab.local;

    # Certificate and private key
    ssl_certificate     /etc/nginx/ssl/victim-web.cert.pem;
    ssl_certificate_key /etc/nginx/ssl/victim-web.key.pem;
    ssl_trusted_certificate /etc/nginx/ssl/ca-chain.cert.pem;

    # TLS 1.3 ONLY — disable 1.0 and 1.1
    ssl_protocols TLSv1.3;

    # Strong cipher suites — TLS 1.3 uses its own cipher suite set
    # For TLS 1.2 compatibility (if needed), use only:
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # ECDH curve — prefer X25519 and P-384
    ssl_ecdh_curve X25519:P-384:P-256;

    # Session settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;  # Disable for perfect forward secrecy

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'" always;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name victim-web.lab.local;
    return 301 https://$server_name$request_uri;
}
