name: Lab Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Cap a hung step (e.g. a stalled action binary download) instead of
    # letting it ride the runner's 6h default.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    # P6 (S5): the Flask services require these via `${VAR:?}`, so every step
    # that runs `docker compose` (config validation + the build smoke test)
    # needs them set or interpolation fails. Set once at job level so a future
    # compose-using step can't silently reintroduce the failure. Dummy values --
    # compose only renders/builds here; the apps reject known-default secrets at
    # runtime independently of these.
    env:
      FLASK_SECRET_KEY: ci-validate-dummy-not-a-real-secret
      PLAYBOOK_AUTH_TOKEN: ci-validate-dummy-not-a-real-secret

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Each subproject ships its own requirements.txt. Aggregate them so
        # one test runner can import any module under tests/.
        for req in red-team/requirements.txt blue-team/requirements.txt \
                   forensics/scoreboard/requirements.txt; do
          if [ -f "$req" ]; then pip install -r "$req"; fi
        done
        # Phase C1: ruff + mypy for lint / type checks.
        # types-requests is needed because forensics/scoreboard/scorer.py
        # imports requests for ES queries (C3 mypy --strict path).
        pip install ruff mypy types-requests

    - name: Ruff lint
      run: ruff check .

    - name: Mypy strict on load-bearing modules
      # Phase C3: only the two modules that own the type contracts get
      # the --strict treatment; the rest of the lab is runtime duck-typed.
      run: mypy --strict --no-incremental red-team/campaigns/base_campaign.py forensics/scoreboard/scorer.py

    - name: Mypy non-strict across the codebase
      # Phase F4: catch obvious type errors across all 3 subprojects
      # without forcing strict annotations everywhere.
      # --explicit-package-bases handles the dasherized dirs;
      # --ignore-missing-imports skips type stubs for yaml/requests/etc.
      # The --strict scope above stays narrow.
      run: mypy --no-incremental --explicit-package-bases --ignore-missing-imports red-team/ forensics/ blue-team/

    - name: Pre-commit run (all files)
      # Phase F6: mirror the .pre-commit-config.yaml hooks in CI so local +
      # CI agree. Already-passing ruff step above provides early-exit on
      # most issues; this is the catch-net for trailing whitespace, EOF
      # newlines, YAML/JSON syntax, mixed line endings, etc.
      # Only run on one matrix row to avoid 3x duplicated work.
      if: matrix.python-version == '3.11'
      run: |
        pip install pre-commit
        pre-commit run --all-files --show-diff-on-failure

    - name: Dependabot config syntax check
      # Phase F7: validate .github/dependabot.yml stays well-formed.
      # Caught the next "we shipped a broken dependabot config" class
      # of regression.
      if: matrix.python-version == '3.11'
      run: |
        pip install yamllint
        yamllint -d '{extends: default, rules: {line-length: disable, comments: disable, document-start: disable, truthy: disable}}' .github/dependabot.yml

    - name: Validate Docker Compose (default profile)
      run: docker compose config --quiet

    - name: Validate Docker Compose (--profile pki)
      run: docker compose --profile pki config --quiet

    - name: Docker build smoke test
      # Phase F5: build the lab's own images so missing wheels for a new
      # base image (e.g. python:3.14-slim wheel coverage gaps) fail CI
      # before they hit a dev box. Catches the audit-2 Gap #8 +
      # Phase A1 supply-chain class of regression. Only runs on one
      # matrix row to keep the runner budget reasonable.
      if: matrix.python-version == '3.11'
      run: |
        docker compose build --pull red-team blue-team scoreboard victim-web victim-db victim-mail zeek
        docker compose --profile pki build --pull pki-nginx

    - name: bash -n syntax check on shell scripts
      # Phase F12: ShellCheck catches semantic issues; `bash -n` catches
      # raw parser errors (missing fi/done/etc) that ShellCheck doesn't
      # always flag. Cheap belt-and-suspenders.
      if: matrix.python-version == '3.11'
      run: |
        find scripts blue-team pki-lab target-env -type f -name '*.sh' \
            -exec bash -n {} \; -exec echo "  [ok] {}" \;

    - name: ShellCheck lab scripts
      # ShellCheck is Python-agnostic, so run it once rather than on every
      # matrix leg. The action downloads its binary from GitHub releases at
      # runtime; running it 3x tripled exposure to transient download flakes
      # (e.g. "tar: This does not look like a tar archive").
      if: matrix.python-version == '3.11'
      uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
      with:
        scandir: ./scripts
        severity: warning

    - name: Run all tests with coverage
      # Discover every test_*.py under tests/ — covers test_campaigns,
      # test_playbooks, test_pki, and test_scorer (Gap #6 audit fix).
      # EVIDENCE_DIR overridden so save_artifact() in BaseCampaign has a
      # writable location on the bare runner (the default /evidence is only
      # writable from inside the lab containers).
      # Phase F8: coverage runs on the 3.11 matrix row only; floor set in
      # pyproject.toml [tool.coverage.report] fail_under.
      env:
        EVIDENCE_DIR: ${{ runner.temp }}/evidence
      run: |
        mkdir -p "$EVIDENCE_DIR"
        if [ "${{ matrix.python-version }}" = "3.11" ]; then
          pip install coverage
          coverage run -m unittest discover -s tests -v
          coverage report
        else
          python -m unittest discover -s tests -v
        fi

    - name: Smoke-test Sigma compile pipeline
      # Compile every .yml in blue-team/detection/sigma/ to EQL JSON. Catches
      # rule syntax regressions before they ship. REBASE=0 so we don't try to
      # push to a non-existent Kibana from CI.
      # Added retry loop because sigma-cli sometimes times out fetching MITRE data.
      run: |
        for i in {1..3}; do
          bash scripts/setup/compile_sigma.sh && exit 0 || echo "Attempt $i failed"
          sleep 5
        done
        exit 1
