name: Integration (Full Kill Chain)

# Phase C4. This workflow spins up the entire compose stack and runs the
# kill chain end-to-end. It is gated on workflow_dispatch because:
#   * docker compose up takes 3-5 minutes on the GitHub runner
#   * ELK eats most of the runner's 7GB
# So it would dominate the PR feedback loop if it ran on every push.
#
# audit-4 G2d: this job is the lab's correctness gate -- it asserts the
# OUTPUT contracts that unit tests structurally can't reach, because the
# seam is the cross-container data flow:
#   1. Scoring works     -- scoreboard reports non-zero red + blue
#      detection scores after the kill chain (G1e).
#   2. Response works     -- an IR playbook lifts blue response_score (G1c).
#   3. Detections fire    -- every shipped Sigma rule has a live ingest
#      path: its campaign's syslog advisory reaches the syslog-* index,
#      and Suricata covers each network-visible technique (G2b/F1).
#
# Trigger manually from the GitHub Actions UI, or via:
#   gh workflow run integration.yml
on:
  workflow_dispatch:
  # Optional weekly safety net so dependency rot is caught even if no
  # one remembers to trigger it manually.
  schedule:
    - cron: "0 6 * * 1"   # Mondays at 06:00 UTC

jobs:
  killchain:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: pip

    - name: Install Python dependencies for the test harness
      # tests/integration/test_killchain.py imports runner.py from the
      # bare CI runner to walk TECHNIQUE_MAP for per-technique alert
      # assertions. That requires runner's top-level imports (click,
      # rich) to resolve outside the red-team container. Mirror the
      # install step in validate.yml so the test harness has the same
      # deps the unit suite already relies on.
      run: |
        python -m pip install --upgrade pip
        for req in red-team/requirements.txt blue-team/requirements.txt \
                   forensics/scoreboard/requirements.txt; do
          if [ -f "$req" ]; then pip install -r "$req"; fi
        done

    - name: Prepare .env (skip egress preflight, enable IR profile)
      run: |
        cp .env.example .env
        # audit-4 G3b: IR is opt-in by default now. The integration suite
        # exercises the response/playbook path (test_response_score_rises_*),
        # so it needs the blue-team IR container -- enable it explicitly.
        # Also enable `pki` so the G3a one-shot CA bootstrap is verified live.
        # Set it in the environment (not .env) so EVERY `docker compose`
        # invocation in this job -- start.sh up AND the verify-step
        # logs/exec -- sees the same active profiles. (Env overrides .env,
        # which ships COMPOSE_PROFILES= empty after G3b.)
        echo "COMPOSE_PROFILES=ir,pki" >> "$GITHUB_ENV"
        # The runner is on the public internet -- the preflight would
        # refuse to start. Air-gap is enforced via lab-net internal:true
        # at the network layer, which still applies.
        echo "AIB_SKIP_PREFLIGHT=1" >> "$GITHUB_ENV"

    - name: Build + start the lab
      run: bash scripts/lab/start.sh

    - name: Tail compose ps for diagnostics
      run: docker compose ps

    - name: Run integration test
      env:
        AIB_RUN_INTEGRATION: "1"
        EVIDENCE_DIR: ${{ runner.temp }}/evidence
      run: |
        mkdir -p "$EVIDENCE_DIR"
        python -m unittest discover -s tests/integration -v

    - name: Verify PKI profile serves TLS (audit-4 G3a)
      # The pki-init one-shot should have bootstrapped the CA + staged the
      # victim-web cert from a clean checkout, so pki-nginx serves HTTPS
      # instead of crash-looping. Reach it from inside a lab-net container
      # (same path the integration tests use for ES/scoreboard), which
      # avoids host port-publish quirks. Any HTTP status proves TLS loaded.
      run: |
        # Use raw `docker` (not `docker compose`) so container lookup doesn't
        # depend on compose profile/project resolution.
        echo "=== pki containers ==="; docker ps -a --filter name=pki --format '{{.Names}}\t{{.Status}}'
        NGINX=$(docker ps -a --filter name=pki-nginx --format '{{.Names}}' | head -1)
        INIT=$(docker ps -a --filter name=pki-init --format '{{.Names}}' | head -1)
        echo "=== pki-init log ($INIT) ===";  [ -n "$INIT" ]  && docker logs "$INIT"  2>&1 | tail -30 || echo "(no pki-init container)"
        echo "=== pki-nginx log ($NGINX) ==="; [ -n "$NGINX" ] && docker logs "$NGINX" 2>&1 | tail -30 || echo "(no pki-nginx container)"
        echo "=== staged certs ==="; ls -l pki-lab/certs/ || true
        if [ -z "$NGINX" ]; then echo "::error::no pki-nginx container exists"; exit 1; fi
        ok=
        for i in $(seq 1 12); do
          code=$(docker exec "$NGINX" curl -sk -o /dev/null -w '%{http_code}' https://localhost:443/ 2>/dev/null || true)
          echo "  attempt $i: HTTP [$code]  (container: $(docker inspect -f '{{.State.Status}}' "$NGINX" 2>/dev/null))"
          if [ -n "$code" ] && [ "$code" != "000" ]; then ok=1; break; fi
          sleep 5
        done
        if [ -z "$ok" ]; then
          echo "::error::pki-nginx did not serve TLS -- G3a cert bootstrap failed"
          exit 1
        fi
        echo "[pki] pki-nginx served a TLS response (G3a verified)"

    - name: Dump compose logs on failure
      if: failure()
      run: docker compose logs --tail=200

    - name: Tear down
      if: always()
      run: docker compose down -v
