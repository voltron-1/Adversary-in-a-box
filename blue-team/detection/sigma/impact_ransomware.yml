title: Ransomware Behavior -- Mass File Rename + Ransom Note
id: f5a6b7c8-4567-8901-2345-ef0123456789
status: experimental
description: |
    Detects the behavioral signature of T1486 (Data Encrypted for
    Impact). The Adversary-in-a-Box ransomware_sim campaign renames
    decoy files in /tmp/ransom-decoys/ to a .locked suffix and drops a
    ransom_note.txt -- no actual encryption. Production analogue: pair
    with a file-system watcher that fires on extension-change bursts
    (>=N renames in <60s within a single directory).
references:
    - https://attack.mitre.org/techniques/T1486/
    - https://www.cisa.gov/stopransomware
author: Adversary-in-a-Box Lab
date: 2026/05/24
tags:
    - attack.impact
    - attack.t1486
logsource:
    product: linux
    service: syslog  # audit-4 G2b: retargeted from file_event to the live syslog ingest path
detection:
    rename_marker:
        - '.locked'
        - 'ransom_note.txt'
    decoy_path:
        - '/tmp/ransom-decoys'
    condition: rename_marker and decoy_path
falsepositives:
    - Backup tools that append .locked or .bak suffixes during rotation
      (rare; check the source path).
level: critical
fields:
    - file.path
    - file.name
    - file.extension
    - process.executable
