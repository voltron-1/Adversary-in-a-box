title: HTTPS Exfiltration Over C2 Channel
id: c3d4e5f6-a7b8-9012-cdef-345678901234
status: experimental
description: Detects data exfiltration over HTTPS C2 channel (T1041)
references:
    - https://attack.mitre.org/techniques/T1041/
author: Adversary-in-a-Box Lab
date: 2024/01/01
tags:
    - attack.exfiltration
    - attack.t1041
logsource:
    product: proxy
    category: webproxy
detection:
    large_upload:
        c-cs-bytes|gt: 1000000  # > 1MB upload
    suspicious_ua:
        cs-user-agent|contains:
            - 'python-requests'
            - 'Go-http-client'
            - 'libwww-perl'
    unusual_destination:
        cs-host|endswith:
            - '.onion'
            - '.xyz'
            - '.top'
            - '.tk'
    condition: large_upload or (suspicious_ua and unusual_destination)
falsepositives:
    - Legitimate software update downloads
    - Cloud backup operations
level: medium
fields:
    - DestinationHostname
    - DestinationPort
    - HttpMethod
    - UserAgent
    - BytesSent
