title: HTTPS Exfiltration Over C2 Channel
id: c3d4e5f6-a7b8-9012-cdef-345678901234
status: experimental
description: Detects data exfiltration over HTTPS C2 channel (T1041)
references:
    - https://attack.mitre.org/techniques/T1041/
author: Adversary-in-a-Box Lab
date: 2024/01/01
tags:
    - attack.exfiltration
    - attack.t1041
logsource:
    product: linux
    service: syslog  # audit-4 G2b: retargeted from proxy/webproxy to the live syslog ingest path
detection:
    # audit-4 G2b: the webproxy field selectors (c-cs-bytes, cs-user-agent,
    # cs-host) had no ingest path in the lab. The https_exfil campaign now
    # ships a syslog advisory carrying these keyword markers instead.
    exfil_marker:
        - 'https_exfil_simulation'
        - 'c2_beacon'
    suspicious_ua:
        - 'python-requests'
        - 'Go-http-client'
        - 'libwww-perl'
    condition: exfil_marker and suspicious_ua
falsepositives:
    - Legitimate software update downloads
    - Cloud backup operations
level: medium
fields:
    - DestinationHostname
    - DestinationPort
    - HttpMethod
    - UserAgent
    - BytesSent
