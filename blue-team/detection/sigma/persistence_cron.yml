title: Cron-based Backdoor Persistence
id: b2c3d4e5-f6a7-8901-bcde-f23456789012
status: experimental
description: Detects cron job modifications indicative of persistence (T1053.003)
references:
    - https://attack.mitre.org/techniques/T1053/003/
author: Adversary-in-a-Box Lab
date: 2024/01/01
tags:
    - attack.persistence
    - attack.t1053.003
logsource:
    product: linux
    service: syslog
detection:
    cron_edit:
        - 'crontab -e'
        - 'crontab -l'
        - '/etc/cron.'
        - '/var/spool/cron'
    suspicious_content:
        - '/tmp/'
        - '/dev/shm/'
        - 'bash -i'
        - '/dev/tcp/'
        - 'nc -'
        - 'wget '
        - 'curl '
    condition: cron_edit and suspicious_content
falsepositives:
    - Legitimate scheduled task management
    - System maintenance scripts
level: high
fields:
    - CommandLine
    - User
    - ParentImage
