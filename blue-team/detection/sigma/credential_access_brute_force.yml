title: Credential Brute Force -- Failed Auth Burst
id: d3e4f5a6-2345-6789-0123-cdef01234567
status: experimental
description: |
    Detects a burst of failed-authentication requests against a lab web
    endpoint (T1110). The Adversary-in-a-Box brute_force campaign issues
    sequential POST /login attempts; each failure logs as 401 or 200 with
    the "Invalid credentials" string. This rule fires on the cumulative
    pattern -- pair with a Kibana threshold rule (>= 5 failures in 60s
    from the same source IP) for the production analogue.
references:
    - https://attack.mitre.org/techniques/T1110/
author: Adversary-in-a-Box Lab
date: 2026/05/24
tags:
    - attack.credential_access
    - attack.t1110
logsource:
    product: linux
    service: syslog  # audit-4 G2b: retargeted from webserver to the live syslog ingest path
detection:
    failed_auth:
        - 'POST /login'
        - '401'
        - 'Invalid credentials'
        - 'authentication failed'
    burst_indicator:
        - 'username='
        - 'password='
    condition: failed_auth and burst_indicator
falsepositives:
    - Legitimate users mistyping passwords (a threshold rule of >= 5 in
      60s mostly filters this).
    - Browser auto-fill retries.
level: medium
fields:
    - source.ip
    - http.request.method
    - http.response.status_code
    - user.name
