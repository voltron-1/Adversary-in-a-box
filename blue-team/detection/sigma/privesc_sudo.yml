title: Privilege Escalation via Sudo Abuse
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: Detects privilege escalation via misconfigured sudo rules (T1548.003)
references:
    - https://attack.mitre.org/techniques/T1548/003/
    - https://gtfobins.github.io/
author: Adversary-in-a-Box Lab
date: 2024/01/01
tags:
    - attack.privilege_escalation
    - attack.t1548.003
logsource:
    product: linux
    service: auth
detection:
    keywords:
        - 'sudo: .*COMMAND=/usr/bin/find'
        - 'sudo: .*COMMAND=/usr/bin/vim'
        - 'sudo: .*COMMAND=/usr/bin/python3'
        - 'sudo: .*COMMAND=/usr/bin/awk'
        - 'sudo: .*COMMAND=/usr/bin/perl'
    sudo_nopasswd:
        - 'sudo -l'
        - 'NOPASSWD'
    condition: keywords or sudo_nopasswd
falsepositives:
    - Legitimate administrative use of sudo
    - Authorized system maintenance
level: high
fields:
    - CommandLine
    - User
    - Image
