# =============================================================================
# Adversary-in-a-Box — Docker Compose
# Orchestrates: Red Team | Blue Team | Target Env | ELK SIEM | Forensic Board
#
# Phase 0 — Per-student isolation:
#   - The project name (COMPOSE_PROJECT_NAME) prefixes every container and
#     network, so two students on the same host do not collide.
#   - Service-to-service DNS still uses the bare service name (red-team,
#     victim-web, etc.) — internal references do not change.
#   - All host-port bindings and the lab subnet are parameterized via .env
#     so per-student stacks can run side-by-side.
#   - Helper: `scripts/lab/student-env.sh <student-id>` generates a ready-to-use
#     .env from the active student id.
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-adversary-in-a-box}

networks:
  lab-net:
    driver: bridge
    internal: true            # OQ-1: block external egress; lab traffic stays in-band
    ipam:
      config:
        - subnet: ${LAB_NET_PREFIX:-172.20.0}.0/24
  quarantine-net:
    driver: bridge
    internal: true            # OQ-3: forensic-only channel for isolated hosts
    ipam:
      config:
        - subnet: ${QUARANTINE_NET_PREFIX:-172.20.1}.0/24

volumes:
  es-data:
  kibana-data:
  # Phase B2a: shared between zeek (writer) and logstash (reader).
  zeek-logs:
  # P5: persistent Logstash data dir (the file-input sincedb lives here) so a
  # logstash restart doesn't replay logs and double-count events into ES.
  logstash-data:
  # NOTE: evidence is intentionally NOT a named volume. We bind-mount
  # ./evidence into /evidence in every container that produces or reads
  # forensic artifacts. That keeps the host-side chain-of-custody workflow
  # (see docs/walkthrough_scenarios.md, master_command_list.md) honest:
  # what the playbook engine writes is what the student hashes.

services:

  # ---------------------------------------------------------------------------
  # RED TEAM — Kali-based attack container
  # ---------------------------------------------------------------------------
  red-team:
    build: ./red-team
    hostname: attacker
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.10
    volumes:
      - ./red-team:/app
      - ./evidence:/evidence
    environment:
      - TARGET_WEB=${TARGET_WEB_URL:-http://victim-web}
      - TARGET_DB=${TARGET_DB_HOST:-victim-db}
      - TARGET_MAIL=${TARGET_MAIL_HOST:-victim-mail}
      - SIEM_HOST=${SIEM_HOST:-elasticsearch}
      # P4: stamp the attacker source.ip to match this container's actual
      # lab-net address. Without it the MITRE tagger fell back to a hardcoded
      # 172.20.0.10, so under a custom LAB_NET_PREFIX every attack doc carried
      # the wrong source.ip and IP-pivoting dashboards/correlation missed it.
      - ATTACKER_IP=${LAB_NET_PREFIX:-172.20.0}.10
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - victim-web
      - victim-db
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BLUE TEAM DASHBOARD — Flask alert & playbook UI
  #
  # SECURITY: gated behind the "ir" profile because this container is granted
  # /var/run/docker.sock (= root on the host) and NET_ADMIN so the IR scripts
  # (isolate_host.sh, block_ip.sh) can quarantine victims and edit iptables.
  # A flask RCE here would be a single-step host takeover.
  #
  # .env.example sets COMPOSE_PROFILES=ir by default so `docker compose up`
  # still works for normal lab use. A security-conscious operator can run
  # `COMPOSE_PROFILES= docker compose up` to start the lab WITHOUT the
  # blue-team container — the dashboard won't be available, but the rest of
  # the stack (red-team, victims, SIEM, scoreboard) functions normally.
  # ---------------------------------------------------------------------------
  blue-team:
    build: ./blue-team
    hostname: defender
    profiles: ["ir"]
    ports:
      - "${BLUE_TEAM_PORT:-5000}:5000"
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.20
      quarantine-net:                # OQ-3: forensic channel reaches isolated hosts
        ipv4_address: ${QUARANTINE_NET_PREFIX:-172.20.1}.20
    volumes:
      - ./blue-team:/app
      - ./evidence:/evidence
      # OQ-3: isolate_host.sh / restore_host.sh and block_ip.sh call the Docker
      # daemon and iptables on the host. The socket mount lets the playbook
      # engine move containers between lab-net and quarantine-net.
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      # block_ip.sh manipulates iptables inside the blue-team container.
      - NET_ADMIN
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - SECRET_KEY=${FLASK_SECRET_KEY:-lab-secret-change-me}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Compose project name surfaces inside containers so IR scripts can build
      # network names like ${LAB_NET} = "<project>_lab-net".
      - LAB_NET=${COMPOSE_PROJECT_NAME:-adversary-in-a-box}_lab-net
      - QUARANTINE_NET=${COMPOSE_PROJECT_NAME:-adversary-in-a-box}_quarantine-net
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # TARGET ENVIRONMENT — Vulnerable victim services
  # ---------------------------------------------------------------------------
  victim-web:
    build: ./target-env/victim-web
    hostname: victim-web
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.30
    environment:
      - DB_HOST=${TARGET_DB_HOST:-victim-db}
      - DB_USER=${DB_USER:-admin}
      - DB_PASS=${DB_PASS:-password123}
      - DB_NAME=${DB_NAME:-labdb}
    depends_on:
      - victim-db
    restart: unless-stopped

  victim-db:
    build: ./target-env/victim-db
    hostname: victim-db
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.31
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-root}
      - MYSQL_DATABASE=${DB_NAME:-labdb}
      - MYSQL_USER=${DB_USER:-admin}
      - MYSQL_PASSWORD=${DB_PASS:-password123}
    restart: unless-stopped

  victim-mail:
    build: ./target-env/victim-mail
    hostname: victim-mail
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.32
    environment:
      # Audit-2 Gap #2: entrypoint.sh reads this to compute postfix mynetworks
      # so per-student LAB_NET_PREFIX changes don't leave the mail server
      # refusing legitimate lab traffic.
      - LAB_NET_PREFIX=${LAB_NET_PREFIX:-172.20.0}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SURICATA IDS — Inline network sensor
  #
  # Suricata remains on host networking by design: it is the *instructor-side*
  # sensor (conceptually part of Phase 4 monitoring), not student-executed
  # code. The Phase 0 air-gap guarantee applies to traffic originating in
  # student-attacker containers (verified by scripts/safety/egress_test.sh).
  # ---------------------------------------------------------------------------
  suricata:
    # P3 (image pinning): pinned to the multi-arch *manifest-list* (index)
    # digest jasonish/suricata:latest resolved to on 2026-06-22 (behavior-
    # preserving freeze of the floating tag that still resolves per-platform --
    # amd64 in CI, arm64 on Apple Silicon). Identify the version with
    # `docker run --rm --entrypoint suricata <ref> -V`; bump per the
    # image-pinning note in docs/setup-guide.md.
    image: jasonish/suricata@sha256:47965a058991aefbcfcd3fc6daea875c08470258af640c09c41faa466ee0b6ce
    hostname: suricata
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      # Bind to a side path -- the image's /docker-entrypoint.sh runs
      # `chown -R suricata:suricata /etc/suricata` under `set -e`, which
      # 1's out on a :ro file mount and trips a restart loop. Copying
      # in at start is the smallest change that keeps the host config
      # read-only AND lets suricata launch.
      - ./blue-team/detection/suricata:/lab-config:ro
      - /var/log/suricata:/var/log/suricata
    # The image's /docker-entrypoint.sh does `exec $@` (unquoted), which
    # word-splits a multi-word `command:` and breaks `sh -c "..."`. Bypass
    # it with our own entrypoint that runs as root, copies the config in,
    # then exec's suricata. The image's fix_perms path is also avoided
    # this way (it chowns the :ro bind-mounts and trips set -e).
    # Audit-2 Gap #2: override the baked HOME_NET in suricata.yaml so
    # per-student LAB_NET_PREFIX flows through to the detection rules.
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/suricata/rules && \
        cp /lab-config/suricata.yaml /etc/suricata/suricata.yaml && \
        cp /lab-config/local.rules /etc/suricata/rules/local.rules && \
        # /var/log/suricata is a host bind-mount and persists across
        # runs. Stale eve.json events from a prior run (especially ones
        # captured on the wrong iface) trip an ES mapping conflict in
        # Logstash that then rejects ALL subsequent alerts. Truncate to
        # guarantee each container starts with a clean log.
        : > /var/log/suricata/eve.json ; \
        : > /var/log/suricata/fast.log ; \
        # Auto-detect the lab bridge: find the iface holding the lab-net
        # gateway IP (${LAB_NET_PREFIX}.1). On a Linux host with docker
        # bridges in the host netns this is br-<hash>; on Docker Desktop
        # for Win/Mac the lab bridge lives in the same WSL VM as our
        # host-network suricata, so the same detection works. Fall back
        # to ${SURICATA_IFACE:-eth0} if the bridge is unreachable.
        IFACE=$$(ip -o -4 addr show 2>/dev/null | awk -v ip="${LAB_NET_PREFIX:-172.20.0}.1/" '$$4 ~ "^"ip {print $$2; exit}') && \
        [ -z "$$IFACE" ] && IFACE="${SURICATA_IFACE:-eth0}" ; \
        echo "[suricata] listening on $$IFACE (lab-net gateway ${LAB_NET_PREFIX:-172.20.0}.1)" && \
        exec suricata -i "$$IFACE" \
             --pidfile /var/run/suricata.pid \
             --set vars.address-groups.HOME_NET=[${LAB_NET_PREFIX:-172.20.0}.0/24]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ZEEK NSM -- network security monitor (Phase B2a)
  #
  # Closes pre-existing issue #13: the detection scripts under
  # blue-team/detection/zeek/ existed but had no runtime. Zeek sits on
  # lab-net and writes JSON logs to a shared named volume that Logstash
  # ingests. entrypoint.sh templates Site::local_nets from LAB_NET_PREFIX
  # so per-student isolation flows through (Zeek has no env-var
  # substitution at the .zeek-file level).
  # ---------------------------------------------------------------------------
  zeek:
    image: zeek/zeek:7.0
    hostname: zeek
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.53
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./blue-team/detection/zeek:/usr/local/zeek/share/zeek/site:ro
      - zeek-logs:/var/log/zeek
    environment:
      - LAB_NET_PREFIX=${LAB_NET_PREFIX:-172.20.0}
      - ZEEK_IFACE=eth0
    entrypoint: ["/bin/sh", "/usr/local/zeek/share/zeek/site/entrypoint.sh"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ELK SIEM — Elasticsearch + Logstash + Kibana
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    hostname: elasticsearch
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.50
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./siem/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    # Phase C6: cap memory so a single OOMing student stack can't take
    # down a shared lab host. Heap is 1G; container ceiling is 2G to
    # leave room for ES off-heap (Lucene mmap, networking buffers).
    mem_limit: 2g
    # Phase C7: ES advertises ready via the cluster health endpoint;
    # 'yellow' is sufficient for a single-node lab (green requires
    # replicas which don't exist on single-node).
    healthcheck:
      # audit-4 G2a: the query string MUST be single-quoted. Unquoted, the
      # `&` is a shell job-control operator under CMD-SHELL (sh -c): it
      # backgrounds curl and runs `timeout=5s || exit 1` as a separate
      # statement -- a variable assignment that always exits 0 -- so the
      # probe reported healthy even when ES was down or curl failed.
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18
      # Phase F follow-up: bumped from 30s. ES on a cold GitHub
      # runner regularly needs 60-90s before its JVM accepts queries,
      # which was tripping the C7 healthcheck during the integration
      # workflow (run 26380249772 hit the start.sh 180s ceiling with
      # ES still starting).
      start_period: 90s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    hostname: logstash
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.51
    volumes:
      - ./siem/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./siem/logstash/pipelines:/usr/share/logstash/pipeline:ro
      - /var/log/suricata:/suricata-logs:ro
      # Phase B2a: Zeek now writes into the shared zeek-logs named volume.
      # Logstash reads from the same volume so per-student isolation works
      # on Docker Desktop (the old host bind /var/log/zeek doesn't exist
      # on Mac/Windows VMs).
      - zeek-logs:/zeek-logs:ro
      # P5: persist Logstash state (incl. the file-input sincedb) across
      # restarts so re-reading eve.json / zeek logs from byte 0 no longer
      # duplicates every event into ES and corrupts MTTD/MTTA scoring.
      - logstash-data:/usr/share/logstash/data
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    # Phase C6: heap 512m; cap container at 1G for pipeline buffers.
    mem_limit: 1g
    depends_on:
      - elasticsearch
    # audit-4 L6: probe the Logstash monitoring API (port 9600) so a
    # pipeline that never comes up surfaces as `unhealthy` instead of
    # silently dropping every event. start_period covers JVM warm-up on a
    # cold runner, mirroring the Elasticsearch probe above.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600/_node/pipelines || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    hostname: kibana
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.52
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    volumes:
      - ./siem/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana-data:/usr/share/kibana/data
    # Phase C6: Kibana node process. 1G ceiling is comfortable for the
    # lab's small index volume.
    mem_limit: 1g
    # Phase C7: Kibana exposes /api/status that returns 200 only after
    # the app + plugins finish initializing.
    # Phase F follow-up: start_period bumped to 120s for slow runners.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 120s
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FORENSIC SCOREBOARD — Tracks red/blue team scores
  # ---------------------------------------------------------------------------
  scoreboard:
    build:
      context: ./forensics/scoreboard
    hostname: scoreboard
    ports:
      - "${SCOREBOARD_PORT:-5002}:5002"
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.60
    volumes:
      - ./evidence:/evidence
      - ./forensics:/app/forensics
      # P1: mount the deployed Sigma rules read-only so the scoreboard can
      # evaluate them against syslog-* advisories (scorer._sigma_detection_ts).
      - ./blue-team/detection/sigma:/app/sigma:ro
    # Phase C7: Flask returns 200 on / once the Scorer can talk to ES.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5002/api/scores || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      # P1: where scorer.py loads the Sigma rules from (matches the mount above).
      - SIGMA_RULES_DIR=${SIGMA_RULES_DIR:-/app/sigma}
      - SECRET_KEY=${FLASK_SECRET_KEY:-lab-secret-change-me}
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PKI LAB (OQ-4) — opt-in via `docker compose --profile pki up -d`
  # ---------------------------------------------------------------------------
  pki-nginx:
    build: ./pki-lab/tls_hardening
    hostname: pki-nginx
    profiles: ["pki"]
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.70
    ports:
      - "${PKI_NGINX_PORT:-8443}:443"
    volumes:
      # Mount as a conf.d snippet so the stock nginx.conf wraps it in events{}/http{}.
      - ./pki-lab/tls_hardening/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
      # Cert path matches the ssl_certificate_* directives in nginx-tls.conf.
      - ./pki-lab/certs:/etc/nginx/ssl:ro
    # audit-4 G3a: wait for the one-shot CA bootstrap to stage the certs so
    # nginx doesn't crash-loop on a clean checkout.
    depends_on:
      pki-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # audit-4 G3a: one-shot CA bootstrap so `docker compose --profile pki up`
  # serves TLS from a clean checkout. Builds the two-tier CA + a victim-web
  # leaf cert and stages the three files pki-nginx mounts. Idempotent (skips
  # if certs already exist). Runs in alpine `sh` with no network -- the
  # setup_ca.sh / issue_cert.sh scripts are POSIX, so no bash/apt needed
  # (and lab-net is air-gapped anyway).
  pki-init:
    image: alpine/openssl
    hostname: pki-init
    profiles: ["pki"]
    volumes:
      - ./pki-lab:/workspace
    working_dir: /workspace
    environment:
      - PKI_DIR=/workspace/ca
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ -f certs/victim-web.cert.pem ] && [ -f certs/victim-web.key.pem ] \
           && [ -f certs/ca-chain.cert.pem ]; then
          echo "[pki-init] certs already present -- skipping CA bootstrap"
          exit 0
        fi
        echo "[pki-init] bootstrapping lab CA + victim-web leaf cert..."
        sh setup_ca.sh
        sh issue_cert.sh victim-web.lab.local
        mkdir -p certs
        cp ca/intermediate-ca/certs/victim-web.lab.local.cert.pem certs/victim-web.cert.pem
        cp ca/intermediate-ca/private/victim-web.lab.local.key.pem certs/victim-web.key.pem
        cp ca/intermediate-ca/certs/ca-chain.cert.pem certs/ca-chain.cert.pem
        echo "[pki-init] staged certs into pki-lab/certs/"
    restart: "no"

  pki-ca:
    image: alpine/openssl
    hostname: pki-ca
    profiles: ["pki"]
    networks:
      lab-net:
        ipv4_address: ${LAB_NET_PREFIX:-172.20.0}.71
    volumes:
      - ./pki-lab:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c", "tail -f /dev/null"]
    restart: unless-stopped
